<body class="admin-auth-body">
    <main class="admin-auth-shell">
        

<div class="auth-page auth-page-admin">
    <div class="container auth-container">
        <div class="auth-card auth-card-admin">
            <div class="auth-eyebrow">Yonetim Girisi</div>
            <h1 class="auth-title">Admin paneline giris yap</h1>
            <p class="auth-subtitle">Bu alan storefront'tan bagimsiz backoffice olarak dusunuluyor. Bugun /yonetim ve /admin altinda; ileride admin subdomain'e tasinabilir.</p>

            <div class="admin-operator-card mb-4">
                <span>Gelistirme kisayolu</span>
                <strong>/yonetim</strong>
                <small>Path tabanli kisayol, subdomain gecisi icin gecici kopru.</small>
            </div>

            <form method="post" class="auth-form">
                
                <input type="hidden" id="ReturnUrl" name="ReturnUrl" value="/admin/showcases/edit/1" />

                

                <div class="mb-3">
                    <label class="form-label" for="Email">Email</label>
                    <input class="form-control auth-input" type="email" data-val="true" data-val-email="The Email field is not a valid e-mail address." data-val-required="The Email field is required." id="Email" name="Email" value="" />
                    <span class="text-danger field-validation-valid" data-valmsg-for="Email" data-valmsg-replace="true"></span>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="Password">Password</label>
                    <input class="form-control auth-input" type="password" data-val="true" data-val-required="The Password field is required." id="Password" name="Password" />
                    <span class="text-danger field-validation-valid" data-valmsg-for="Password" data-valmsg-replace="true"></span>
                </div>

                <button type="submit" class="btn auth-submit-btn">Admin Girisi</button>

        </div>
    </div>
</div>
